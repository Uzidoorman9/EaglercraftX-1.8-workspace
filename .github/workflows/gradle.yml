name: Build and Extract HTML

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run Gradle task
        run: ./gradlew makeMainWasmClientBundle

      - name: Find largest HTML file
        id: find_html
        run: |
          FILE=$(find . -type f -name "*.html" -printf "%s %p\n" | sort -nr | head -n1 | cut -d' ' -f2-)
          echo "largest_file=$FILE" >> $GITHUB_OUTPUT

      - name: Prepare output directory
        run: |
          mkdir -p output
          cp "${{ steps.find_html.outputs.largest_file }}" output/JuJutsuEagler.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/JuJutsuEagler.html
          git commit -m "Add JuJutsuEagler.html (auto-generated)" || echo "No changes to commit"
          git push
